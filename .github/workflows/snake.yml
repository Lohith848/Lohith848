
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%2358A6FF&color_dots=%23161B22,%2339D353,%2326A641,%2300A344,%23BC8CFF
            dist/github-snake-dark.svg?color_snake=%23BC8CFF&color_dots=%230D1117,%2339D353,%2326A641,%2300A344,%2358A6FF
            dist/github-snake.gif?color_snake=%23BC8CFF&color_dots=%230D1117,%2339D353,%2326A641,%2300A344,%2358A6FF&color_background=%230D1117

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
